<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <!-- iOS standalone PWA красит зону home-indicator цветом theme-color.
       Стартовое значение = #181513 (dark), но early-load <script> ниже
       синхронно перепишет content до первого paint, исходя из сохранённой
       пользовательской темы. Так safe-area сразу будет правильного цвета. -->
  <meta name="theme-color" content="#181513" />
  <title>Расписание</title>

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,200,0,0&display=block"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="app/styles.min.css" />

  <script>
    // Apply persisted theme + sync iOS theme-color BEFORE first paint.
    // На iOS standalone-PWA theme-color красит зону home-indicator и
    // выставляется ОДИН РАЗ при первом paint — поздние обновления через
    // JS из main.jsx после mount React'а не перерисовывают полосу.
    // Поэтому правим content meta синхронно прямо в <head>.
    try {
      const settings = JSON.parse(localStorage.getItem('rpgu_settings_v1') || '{}');
      let theme = settings.theme || 'dark';
      if (theme === 'system') {
        theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.classList.remove('dark', 'light');
      document.documentElement.classList.add(theme);
      const bg = theme === 'light' ? '#f5f1eb' : '#181513';
      document.querySelectorAll('meta[name="theme-color"]')
        .forEach(m => m.setAttribute('content', bg));
    } catch {}
  </script>
</head>
<body>

  <div id="app-root"></div>

  <!-- React 18 production builds. JSX из app/*.jsx собирается в app/bundle.js
       через esbuild (см. scripts/build.js). Никаких babel-standalone в проде. -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

  <!-- Сборка приложения -->
  <script src="/app/bundle.js" defer></script>

  <!-- Регистрация service worker для offline и SWR кеширования /api/schedule -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>

</body>
</html>
