<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#181513" />
  <title>Расписание</title>

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,200,0,0&display=block"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="app/styles.css" />

  <script>
    // Apply persisted theme as early as possible to avoid flash
    try {
      const settings = JSON.parse(localStorage.getItem('rpgu_settings_v1') || '{}');
      let theme = settings.theme || 'dark';
      if (theme === 'system') {
        theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.classList.remove('dark', 'light');
      document.documentElement.classList.add(theme);
    } catch {}
  </script>
</head>
<body>

  <div id="app-root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Data layer first -->
  <script type="text/babel" data-presets="react" src="app/data.jsx"></script>

  <!-- Router and UI primitives -->
  <script type="text/babel" data-presets="react" src="app/router.jsx"></script>
  <script type="text/babel" data-presets="react" src="app/ui.jsx"></script>

  <!-- Screens -->
  <script type="text/babel" data-presets="react" src="app/home.jsx"></script>
  <script type="text/babel" data-presets="react" src="app/changes.jsx"></script>
  <script type="text/babel" data-presets="react" src="app/editor.jsx"></script>
  <script type="text/babel" data-presets="react" src="app/settings.jsx"></script>

  <!-- App bootstrap -->
  <script type="text/babel" data-presets="react" src="app/main.jsx"></script>

</body>
</html>
