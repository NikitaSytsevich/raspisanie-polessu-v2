<!DOCTYPE html>
<!--
  ВНИМАНИЕ: это ШАБЛОН. Реальный index.html генерируется из него скриптом
  scripts/build.js — он подставляет хэшированные имена ассетов (bundle, CSS,
  React) вместо плейсхолдеров. Правьте этот файл, а не сгенерированный
  index.html (он в .gitignore).
-->
<html lang="ru" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <!-- iOS standalone PWA красит зону home-indicator цветом theme-color.
       Стартовое значение = #181513 (dark), но early-load <script> ниже
       синхронно перепишет content до первого paint, исходя из сохранённой
       пользовательской темы. Так safe-area сразу будет правильного цвета. -->
  <meta name="theme-color" content="#181513" />
  <title>Расписание</title>

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />

  <!-- Ранний старт критичных загрузок: React и бандл лежат на своём origin
       (self-host, не unpkg), поэтому их можно начать качать сразу из <head>,
       параллельно с парсингом, а не в конце <body>. -->
  <link rel="preload" as="script" href="__REACT_JS__" />
  <link rel="preload" as="script" href="__REACT_DOM_JS__" />
  <link rel="preload" as="script" href="__BUNDLE_JS__" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <!-- Material Symbols: display=swap, чтобы иконки не «висели» невидимыми
       до 3 с пока грузится icon-шрифт (раньше было display=block). -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,200,0,0&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="__STYLES_CSS__" />

  <script>
    // Apply persisted theme + sync iOS theme-color BEFORE first paint.
    // На iOS standalone-PWA theme-color красит зону home-indicator и
    // выставляется ОДИН РАЗ при первом paint — поздние обновления через
    // JS из main.jsx после mount React'а не перерисовывают полосу.
    // Поэтому правим content meta синхронно прямо в <head>.
    try {
      const settings = JSON.parse(localStorage.getItem('rpgu_settings_v1') || '{}');
      let theme = settings.theme || 'dark';
      if (theme === 'system') {
        theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.classList.remove('dark', 'light');
      document.documentElement.classList.add(theme);
      const bg = theme === 'light' ? '#f5f1eb' : '#181513';
      document.querySelectorAll('meta[name="theme-color"]')
        .forEach(m => m.setAttribute('content', bg));
    } catch {}

    // Ранний prefetch расписания: запускаем /api/schedule ДО загрузки React и
    // бандла, чтобы сетевой round-trip API перекрылся со скачиванием JS.
    // Data.fetchSchedule() позже подхватит этот промис вместо нового fetch
    // (см. app/data.jsx). Не стреляем, если в localStorage свежий (<5 мин) кэш —
    // тогда fetchSchedule вернёт его без сети.
    try {
      const raw = localStorage.getItem('rpgu_cache_v1');
      const c = raw ? JSON.parse(raw) : null;
      const fresh = c && c.payload && (Date.now() - new Date(c.at).getTime() < 300000);
      if (!fresh) {
        window.__rpguSchedulePrefetch = fetch('/api/schedule', { headers: { Accept: 'application/json' } })
          .then(r => (r.ok ? r.json() : null))
          .catch(() => null);
      }
    } catch {}
  </script>
</head>
<body>

  <div id="app-root"></div>

  <!-- React 18 production (self-host из /app/vendor, не unpkg) + сборка приложения.
       JSX из app/*.jsx собирается в bundle через esbuild (см. scripts/build.js).
       Все три — defer: качаются параллельно (с preload выше — ещё раньше),
       исполняются по порядку и не блокируют парсинг HTML. -->
  <script defer src="__REACT_JS__"></script>
  <script defer src="__REACT_DOM_JS__"></script>
  <script defer src="__BUNDLE_JS__"></script>

  <!-- Регистрация service worker для offline и SWR кеширования /api/schedule -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>

</body>
</html>
